<!DOCTYPE html>
<html class="no-js" lang="vi">
<head>
  <meta charset="utf-8">
  <title>Smart Assistant - Trợ Lý Mua Sắm Điện Máy Thông Thái</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- ANTI-FLASH THEME CONTROLLER -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-main text-primary">

  <!-- HEADER BAR -->
  <header class="app-header">
    <div class="header-left">
      <!-- Toggle button for collapsible sidebar -->
      <button id="btn-toggle-sidebar" class="icon-button" aria-label="Menu lịch sử">
        <i class="fa-solid fa-bars text-base"></i>
      </button>

      <div class="mascot-container animate-mascot-float">
        <img src="img/mascot.png" alt="Dien May Xanh Mascot" onerror="this.src='https://placehold.co/100x100?text=Mascot'">
      </div>
      <div>
        <h1 class="header-title">
          Trợ Lý Mua Sắm Thông Thái
          <span class="badge-retail">v1.3-Retail</span>
        </h1>
        <p class="header-subtitle">AI-Powered Shopping Consultant • Đối Tác Toàn Diện Điện Máy Xanh</p>
      </div>
    </div>

    <div class="header-right">
      <span class="status-indicator">
        <span class="pulse-dot"></span>
        RAG Sẵn Sàng
      </span>
      <span class="divider">|</span>

      <!-- THEME TOGGLE SWITCH -->
      <button id="theme-toggle-btn" class="theme-toggle-btn" title="Chuyển đổi giao diện Sáng/Tối">
        <span id="theme-icon-container">
          <i class="fa-solid fa-moon"></i>
        </span>
        <span id="theme-text-status" class="theme-text-status">Giao diện: Tối</span>
      </button>
    </div>
  </header>

  <!-- APP CORE SHELL CONTAINER -->
  <div id="app-container">

    <!-- COLLAPSIBLE SIDEBAR CONTAINER -->
    <aside id="chat-sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">LỊCH SỬ TƯ VẤN</span>
        <div id="active-category-badge" class="active-category-indicator">Chưa xác định</div>
      </div>

      <div class="sidebar-action-wrapper">
        <button id="btn-new-chat" class="btn-primary-action">
          <i class="fa-solid fa-plus text-xs"></i>
          <span>Tạo cuộc hội thoại mới</span>
        </button>
      </div>

      <!-- Scrolling Chronological List Container -->
      <div id="history-scroll-container" class="history-list"></div>

      <!-- Live Linguistic Slang Translation Box inside sidebar stack -->
      <div class="sidebar-slang-box">
        <span class="slang-title"><i class="fa-solid fa-language mr-1"></i> Bộ Dịch Từ Lóng Địa Phương</span>
        <div id="slang-inspector" class="slang-content">
          <span class="placeholder-text">Chưa phát hiện từ viết tắt...</span>
        </div>
      </div>

      <!-- Technical RAG Metrics Display Panel -->
      <div class="sidebar-metrics">
        <div class="metric-row">
          <span>Độ trễ API RAG:</span>
          <strong id="latency-val">0ms</strong>
        </div>
        <div class="metric-row">
          <span>Giai đoạn:</span>
          <span id="chat-stage" class="stage-highlight">Khởi tạo</span>
        </div>
      </div>
    </aside>

    <!-- MOBILE OVERLAY BACKDROP SCRIM -->
    <div id="sidebar-overlay" class="overlay-backdrop"></div>

    <!-- MAIN PRESENTATION CHAT PRESENTATION VIEWPORT -->
    <div id="main-content-pane">

      <!-- Interactive Messages Container -->
      <main id="chat-box" class="messages-viewport">
        <!-- Message bubbles dynamically injected by app.js -->
      </main>

      <!-- Quick Prompts Deck Tray -->
      <div class="quick-prompts-tray">
        <p class="quick-prompts-title">
          <i class="fa-regular fa-lightbulb text-gold mr-1.5"></i> Gợi ý kịch bản Demo nhanh cho Ban Giám Khảo:
        </p>
        <div class="quick-prompts-grid">
          <button onclick="window.fillQuickPrompt('Mua đh pana dưới 15 củ cho phòng ngủ')" class="prompt-chip">
            ❄️ "Mua đh pana dưới 15 củ"
          </button>
          <button onclick="window.fillQuickPrompt('Tìm tủ lạnh tầm 10tr cho nhà 4 người')" class="prompt-chip">
            🥦 "Tủ lạnh tầm 10tr cho 4 người"
          </button>
          <button onclick="window.fillQuickPrompt('Cần tìm máy laptop sinh viên tầm 15tr mỏng nhẹ để đi học')" class="prompt-chip">
            💻 "Laptop mỏng nhẹ ~15tr"
          </button>
          <button onclick="window.fillQuickPrompt('Hỏi chính sách bảo hành của máy lạnh daikin')" class="prompt-chip">
            🛡️ "Bảo hành máy lạnh Daikin"
          </button>
        </div>
      </div>

      <!-- Input Actions Toolbar Form Tray -->
      <footer class="input-form-tray">
        <form id="chat-form" class="chat-form-wrapper">
          <input
            type="text"
            id="user-input"
            placeholder="Nhập câu hỏi bằng tiếng Việt... (Ví dụ: 'Cần tìm tl tầm 8tr cho gia đình 3 người ko tốn điện')"
            autocomplete="off"
            required
          />
          <div class="form-actions-right">
            <button type="button" class="btn-mic-visual" title="Tính năng giọng nói">
              <i class="fa-solid fa-microphone"></i>
            </button>
            <button type="submit" class="btn-submit-message">
              <span>Gửi</span>
              <i class="fa-solid fa-paper-plane text-xs"></i>
            </button>
          </div>
        </form>
      </footer>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
